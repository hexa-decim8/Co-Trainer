# Co-Trainer - Docker Compose example using the published Docker Hub image
#
# 1. Copy this file: cp docker-compose.example.yml docker-compose.yml
# 2. Copy the env file: cp .env.production.example .env.production
# 3. Fill in your values in .env.production
# 4. Run: docker compose up -d
#
# The image is published to Docker Hub on every push to main.
# Replace YOUR_DOCKERHUB_USERNAME with the actual username, or set the full
# image name if you use a custom DOCKERHUB_REPOSITORY variable.

services:
  app:
    image: YOUR_DOCKERHUB_USERNAME/co-trainer:latest
    container_name: cotrainer-app
    env_file:
      - .env.production
    ports:
      - "8000:8000"
    volumes:
      - cotrainer-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  cotrainer-data:
