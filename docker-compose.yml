version: '3.8'

name: cotrainer

services:
  cotrainer:
    image: ${COTRAINER_IMAGE:-hexadecim8/co-trainer:latest}
    container_name: cotrainer
    ports:
      - "8000:8000"
    environment:
      - NOTION_API_KEY=${NOTION_API_KEY}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID}
      - SECRET_KEY=${SECRET_KEY:-}
      - DATABASE_URL=sqlite:////app/data/cotrainer.db
    volumes:
      - cotrainer_data:/app/data
      - cotrainer_config:/app/config
    restart: unless-stopped

  nginx:
    profiles:
      - https
    build:
      context: ./nginx
    container_name: cotrainer_nginx
    depends_on:
      - cotrainer
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-example.com}
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    restart: unless-stopped

  certbot:
    profiles:
      - https
    image: certbot/certbot:latest
    container_name: cotrainer_certbot
    depends_on:
      - nginx
    environment:
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-admin@example.com}
      - DOMAIN=${DOMAIN:-example.com}
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >-
      /bin/sh -c "trap exit TERM; while :; do
      certbot renew --webroot -w /var/www/certbot --quiet --deploy-hook
      'date +%s > /var/www/certbot/.certbot-reload';
      sleep 12h;
      done"
    restart: unless-stopped

volumes:
  cotrainer_data:
  cotrainer_config:
  letsencrypt:
  certbot_www:
