version: '3.8'

name: cotrainer

services:
  cotrainer:
    image: ${COTRAINER_IMAGE:-hexadecim8/co-trainer:latest}
    container_name: cotrainer
    ports:
      - "8000:8000"
    environment:
      - NOTION_API_KEY=${NOTION_API_KEY}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID}
      - DATABASE_URL=sqlite:////app/data/cotrainer.db
    volumes:
      - cotrainer_data:/app/data
      - cotrainer_config:/app/config
    restart: unless-stopped

volumes:
  cotrainer_data:
  cotrainer_config:
