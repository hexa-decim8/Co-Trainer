name: cotrainer

services:
  cotrainer:
    image: ${COTRAINER_IMAGE:-hexadecim8/co-trainer:latest}
    container_name: cotrainer
    ports:
      - "8000:8000"
    environment:
      - NOTION_API_KEY=${NOTION_API_KEY}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID}
      - SECRET_KEY=${SECRET_KEY:-}
      - DEBUG=${DEBUG:-false}
      - APP_URL=${APP_URL:-}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-}
    volumes:
      - cotrainer_config:/app/config
      - cotrainer_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  cotrainer_config:
    name: cotrainer_config
  cotrainer_pgdata:
    name: cotrainer_pgdata
